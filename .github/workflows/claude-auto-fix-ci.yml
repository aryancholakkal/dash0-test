name: Claude Auto-Fix CI Failures

# SECURITY NOTE
#
# This workflow checks out a PR branch and runs Claude Code against it with
# `contents: write`, giving it the ability to push directly to that branch.
# It is intentionally scoped to branches opened by the Agent0 pipeline
# (branches prefixed `fix/`) — bot-owned branches, not human contributor
# work — and to same-repo PRs only. Do not widen the branch filter to cover
# externally-contributed branches without re-adding a review step.

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  auto-fix:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.pull_requests[0] &&
      startsWith(github.event.workflow_run.head_branch, 'fix/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Stop if this branch already had repeated auto-fix attempts
        run: |
          ATTEMPTS=$(git log --author="claude\[bot\]" --oneline | wc -l)
          echo "Prior auto-fix commits on this branch: $ATTEMPTS"
          if [ "$ATTEMPTS" -ge 2 ]; then
            echo "Already attempted $ATTEMPTS auto-fixes on this branch without a green build. Stopping instead of looping further."
            exit 1
          fi

      - name: Get CI failure details
        id: failure_details
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: ${{ github.event.workflow_run.id }}
            });

            const failedJobs = jobs.data.jobs.filter(job => job.conclusion === 'failure');

            let errorLogs = [];
            for (const job of failedJobs) {
              const logs = await github.rest.actions.downloadJobLogsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                job_id: job.id
              });
              errorLogs.push({
                jobName: job.name,
                logs: logs.data
              });
            }

            return {
              runUrl: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${{ github.event.workflow_run.id }}`,
              failedJobs: failedJobs.map(j => j.name),
              errorLogs: errorLogs
            };

      - name: Fix CI failure with Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            The CI build failed on this branch (${{ github.event.workflow_run.head_branch }}),
            which was opened by an automated bug-fix pipeline (Agent0/Dash0).

            Failed CI run: ${{ fromJSON(steps.failure_details.outputs.result).runUrl }}
            Failed jobs: ${{ join(fromJSON(steps.failure_details.outputs.result).failedJobs, ', ') }}

            Error logs:
            ${{ toJSON(fromJSON(steps.failure_details.outputs.result).errorLogs) }}

            Important context: this repository runs a customized/newer version
            of Next.js with breaking API changes from the version you may
            know from training data. Read AGENTS.md before making changes,
            and verify any Next.js import or API you rely on against the
            actual declarations under node_modules/next/dist/ rather than
            assuming the standard API surface.

            Diagnose the root cause of the build failure, make the minimal
            fix, and run `npm run build` yourself to confirm it passes
            before finishing. Then commit and push the fix directly to this
            branch (${{ github.event.workflow_run.head_branch }}) — do not
            open a new branch or PR.
          claude_args: "--allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,Bash(git:*),Bash(npm:*),Bash(npx:*)'"
